# Dire Wolf configuration for APRS reception
# Использование с sdr_ax25.py
#
# Конвертация I/Q в WAV для Dire Wolf:
# sox -t raw -r 11025 -e unsigned-integer -b 8 -c 1 aprs.bin aprs.wav
#
# Запуск Dire Wolf:
# direwolf -c sdr_direwolf.conf -r 11025 -b 8

# Audio device (use WAV file input)
ADEVICE  -  -

# Channel 0 - APRS 144.800 MHz (Europe/Russia)
MYCALL    NOCALL
ACHANNELS 1
CHANNEL   0
MODE    1200
CHANNEL   0

# PTT control (disabled for receive-only)
PTT    NONE

# APRS filtering
FILTER   b/BUDDY

# Beacon (disabled for receive-only)
#TBEACON

# Position
#GPSD

# Logging
LOGDIR    .
#LOG

# Internet gateway (optional)
#IGSERVER  euro.aprs2.net
#IGLOGIN   NOCALL-10 PASSWORD

# End of configuration
